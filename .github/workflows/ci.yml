name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Rust clippy
        id: clippy
        continue-on-error: true
        run: |
          cd src-tauri
          cargo clippy --all-targets --all-features -- -D warnings > ../clippy.log 2>&1

      - name: Upload clippy log
        if: steps.clippy.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: built-clippy-log
          path: clippy.log

      - name: Fail on clippy error
        if: steps.clippy.outcome == 'failure'
        run: exit 1
