name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-action@v1
        with:
          rust-version: 1.77.2
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Rust fmt
        run: cd src-tauri && cargo fmt --check

      - name: Rust clippy
        run: cd src-tauri && cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust test
        run: cd src-tauri && cargo test
