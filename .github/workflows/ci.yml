name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  ci:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Rust fmt
        run: cd src-tauri && cargo fmt --check

      - name: Apply Clippy fixes
        run: cd src-tauri && cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features -- -D warnings

      - name: Commit Clippy fixes
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/src
          git commit -m "style: inline Rust format arguments"
          git push origin HEAD:${GITHUB_HEAD_REF}

      - name: Rust clippy
        run: cd src-tauri && cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust test
        run: cd src-tauri && cargo test
